<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projeto 100k - Operação Canoas v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        body { background-color: #f8fafc; color: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .spinner { border: 4px solid rgba(16,185,129,0.2); border-left-color: #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- CARREGAMENTO DO BANCO DE DADOS (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FirebaseHelper = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, collection };
    </script>
</head>
<body class="bg-slate-50 text-slate-900 flex justify-center h-[100dvh] overflow-hidden">

    <div id="root" class="w-full max-w-md h-full relative shadow-[0_0_40px_rgba(0,0,0,0.05)] bg-slate-50 flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONES INLINE ---
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconCreditCard = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconMinus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" x2="19" y1="12" y2="12"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconWallet = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconCalendarDays = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>;
        const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconSave = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const IconArrowDownRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 7 10 10"/><path d="M17 7v10H7"/></svg>;

        // --- LÓGICA DE DATAS ---
        const getCycleDates = (dateObj) => {
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth();
            const day = dateObj.getDate();
            let start, end;
            if (day >= 26) {
                start = new Date(year, month, 26);
                end = new Date(year, month + 1, 25);
            } else {
                start = new Date(year, month - 1, 26);
                end = new Date(year, month, 25);
            }
            start.setHours(0, 0, 0, 0);
            end.setHours(0, 0, 0, 0);
            return { start: start.toISOString(), end: end.toISOString() };
        };

        const getTodayStr = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const defaultData = {
            settings: {
                salary: 15000,
                goal: 100000,
                targetDate: '2028-12-31',
                fixedExpenses: {
                    luz: 200, condominio: 600, financiamento1: 1500, financiamento2: 500,
                    internet: 150, gasolina: 600, escola: 1200, supermercado: 2000,
                    planoSaude: 800, seguro: 300, outros: 500
                }
            },
            invested: 30000,
            currentCycle: getCycleDates(new Date()),
            cards: { itau: 2390.27, mp: 479.00, nubank: 240.48 },
            cardsDeductions: { itauGas: 0, itauSuper: 0 }, // NOVO: Deduções fixas no Itaú
            debitSpentThisCycle: 0, 
            cycleRolloverBalance: 0,
            transactions: []
        };

        // --- FIREBASE SETUP ---
        let dbInstance = null;
        let currentAppId = 'pablo-100k-app';

        const setupFirebase = () => {
            if (!window.FirebaseHelper) return null;
            if (dbInstance) return dbInstance;

            const MEU_FIREBASE_CONFIG = {
                apiKey: "AIzaSyA2cH3AwQUv8Ruje2aslcuXiQhPEWS9z5Y",
                authDomain: "controle-100k.firebaseapp.com",
                projectId: "controle-100k",
                storageBucket: "controle-100k.firebasestorage.app",
                messagingSenderId: "315602450917",
                appId: "1:315602450917:web:91e3c4f8a0b33a53bed70c"
            }; 

            if(!MEU_FIREBASE_CONFIG) return null;

            const { initializeApp, getAuth, getFirestore } = window.FirebaseHelper;
            const app = initializeApp(MEU_FIREBASE_CONFIG);
            dbInstance = { auth: getAuth(app), db: getFirestore(app) };
            return dbInstance;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
            const [isAporteModalOpen, setIsAporteModalOpen] = useState(false);
            const [isResgateModalOpen, setIsResgateModalOpen] = useState(false);
            const [editingCard, setEditingCard] = useState(null);
            const [editingInvested, setEditingInvested] = useState(false);
            const [isResetModalOpen, setIsResetModalOpen] = useState(false);
            
            const [data, setData] = useState(null);
            const [user, setUser] = useState(null);
            const [isFirebaseReady, setIsFirebaseReady] = useState(false);
            const [usingFallback, setUsingFallback] = useState(false);

            const [tempSettings, setTempSettings] = useState(null);

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseHelper) {
                        clearInterval(checkFirebase);
                        setIsFirebaseReady(true);
                    }
                }, 100);
                return () => clearInterval(checkFirebase);
            }, []);

            useEffect(() => {
                if (!isFirebaseReady) return;
                const fb = setupFirebase();
                if (!fb) {
                    setUsingFallback(true);
                    const saved = localStorage.getItem('pabloFinances_v3');
                    setData(saved ? JSON.parse(saved) : defaultData);
                    return;
                }
                const { auth } = fb;
                const { signInAnonymously, onAuthStateChanged } = window.FirebaseHelper;

                const initAuth = async () => {
                    try { await signInAnonymously(auth); } 
                    catch (e) {
                        setUsingFallback(true);
                        const saved = localStorage.getItem('pabloFinances_v3');
                        setData(saved ? JSON.parse(saved) : defaultData);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, [isFirebaseReady]);

            useEffect(() => {
                if (!isFirebaseReady || usingFallback || !user) return;
                const { db } = setupFirebase();
                const { doc, onSnapshot, setDoc } = window.FirebaseHelper;
                const docRef = doc(db, 'artifacts', currentAppId, 'public', 'data', 'finances', 'dados_pablo_v3');

                const unsub = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        let fetchedData = docSnap.data();
                        
                        if (!fetchedData.settings) fetchedData = { ...defaultData, ...fetchedData, settings: defaultData.settings };
                        if (!fetchedData.cardsDeductions) fetchedData.cardsDeductions = { itauGas: 0, itauSuper: 0 };

                        const today = new Date();
                        const currentCycle = getCycleDates(today);
                        
                        if (fetchedData.currentCycle && fetchedData.currentCycle.start !== currentCycle.start) {
                            const mTargetDate = new Date(fetchedData.settings.targetDate);
                            const mMonthsRemaining = Math.max(1, (mTargetDate.getFullYear() - today.getFullYear()) * 12 + mTargetDate.getMonth() - today.getMonth());
                            const mMissing = fetchedData.settings.goal - fetchedData.invested - 19300;
                            const mReqAporte = Math.max(0, mMissing / mMonthsRemaining);
                            let mTotalFixed = 0;
                            Object.values(fetchedData.settings.fixedExpenses).forEach(v => mTotalFixed += (parseFloat(v) || 0));
                            
                            const mTetoMesPassado = fetchedData.settings.salary - (mTotalFixed / 2) - mReqAporte + (fetchedData.cycleRolloverBalance || 0);
                            
                            const mDeductions = (fetchedData.cardsDeductions.itauGas || 0) + (fetchedData.cardsDeductions.itauSuper || 0);
                            const mTotalGastoMesPassado = fetchedData.cards.itau + fetchedData.cards.mp + fetchedData.cards.nubank + (fetchedData.debitSpentThisCycle || 0) - mDeductions;
                            
                            const mSobra = mTetoMesPassado - mTotalGastoMesPassado;

                            fetchedData.currentCycle = currentCycle;
                            fetchedData.cycleRolloverBalance = mSobra; 
                            fetchedData.debitSpentThisCycle = 0; 
                            fetchedData.cardsDeductions = { itauGas: 0, itauSuper: 0 }; // Reseta deduções no novo mês
                            setDoc(docRef, fetchedData);
                        }
                        setData(fetchedData);
                        if(!tempSettings) setTempSettings(fetchedData.settings);
                    } else {
                        setDoc(docRef, defaultData);
                        setData(defaultData);
                        setTempSettings(defaultData.settings);
                    }
                }, (error) => {
                    setUsingFallback(true);
                });
                return () => unsub();
            }, [user, isFirebaseReady, usingFallback]);

            const saveData = (newData) => {
                if (usingFallback) {
                    localStorage.setItem('pabloFinances_v3', JSON.stringify(newData));
                    setData(newData);
                } else {
                    const fb = setupFirebase();
                    if (fb && user) {
                        const { doc, setDoc } = window.FirebaseHelper;
                        const docRef = doc(fb.db, 'artifacts', currentAppId, 'public', 'data', 'finances', 'dados_pablo_v3');
                        setDoc(docRef, newData);
                    }
                }
            };

            const handleResetApp = () => {
                saveData(defaultData);
                setTempSettings(defaultData.settings);
                setIsResetModalOpen(false);
                setActiveTab('home');
            };

            const handleAddExpense = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const amount = parseFloat(formData.get('amount'));
                const category = formData.get('category');
                const card = formData.get('card');
                const desc = formData.get('description');

                if (!amount || isNaN(amount)) return;

                const newData = { ...data };
                
                if (card === 'debito') {
                    newData.debitSpentThisCycle = (newData.debitSpentThisCycle || 0) + amount;
                } else {
                    newData.cards[card] = newData.cards[card] + amount;
                }

                newData.transactions = [
                    { id: Date.now(), amount, category, card, desc, dateISO: getTodayStr(), date: new Date().toLocaleDateString('pt-BR') },
                    ...data.transactions
                ];

                saveData(newData);
                setIsExpenseModalOpen(false);
            };

            const handleAporteResgate = (e, type) => {
                e.preventDefault();
                const amount = parseFloat(new FormData(e.target).get('amount'));
                if (!amount || isNaN(amount)) return;

                const newData = { ...data };
                if (type === 'aporte') {
                    newData.invested += amount;
                    newData.transactions = [{ id: Date.now(), amount, category: 'Investimento', card: 'Meta', desc: 'Aporte Realizado', dateISO: getTodayStr(), date: new Date().toLocaleDateString('pt-BR') }, ...data.transactions];
                } else {
                    newData.invested -= amount;
                    newData.transactions = [{ id: Date.now(), amount, category: 'Resgate', card: 'Meta', desc: 'Resgate de Emergência', dateISO: getTodayStr(), date: new Date().toLocaleDateString('pt-BR') }, ...data.transactions];
                }
                
                saveData(newData);
                setIsAporteModalOpen(false);
                setIsResgateModalOpen(false);
            };

            const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
            const formatDateShort = (isoString) => new Date(isoString).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

            if (!data || !tempSettings) {
                return (
                    <div className="flex flex-col h-full w-full items-center justify-center bg-slate-50 text-emerald-600">
                        <div className="spinner mb-4"></div>
                        <p className="text-sm font-semibold text-slate-500 animate-pulse">Carregando motor v3...</p>
                    </div>
                );
            }

            // --- MOTOR MATEMÁTICO V3 (SEMANAL) ---
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayStr = getTodayStr();

            const cycleStart = new Date(data.currentCycle.start);
            const cycleEnd = new Date(data.currentCycle.end);
            const msPerDay = 1000 * 60 * 60 * 24;
            const cycleDaysTotal = Math.round((cycleEnd - cycleStart) / msPerDay) + 1;
            const daysPassed = Math.round((today - cycleStart) / msPerDay) + 1; // 1-based
            
            // Lógica Semanal
            const currentWeekIndex = Math.floor((daysPassed - 1) / 7);
            const weekStart = new Date(cycleStart);
            weekStart.setDate(weekStart.getDate() + currentWeekIndex * 7);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            const actualWeekEnd = weekEnd > cycleEnd ? cycleEnd : weekEnd;
            const daysInThisWeek = Math.round((actualWeekEnd - weekStart) / msPerDay) + 1;
            const daysRemainingInCycleFromWeekStart = cycleDaysTotal - (currentWeekIndex * 7);

            // Aporte Dinâmico
            const futureIncomes = 4300 + 15000; 
            const targetDateObj = new Date(data.settings.targetDate);
            const monthsRemaining = Math.max(1, (targetDateObj.getFullYear() - today.getFullYear()) * 12 + targetDateObj.getMonth() - today.getMonth());
            const missingForGoal = data.settings.goal - data.invested - futureIncomes;
            const requiredMonthlyAporte = Math.max(0, missingForGoal / monthsRemaining);

            // Gastos Fixos Compartilhados
            let totalFixed = 0;
            Object.values(data.settings.fixedExpenses).forEach(v => totalFixed += (parseFloat(v) || 0));
            const myFixedShare = totalFixed / 2;

            // Teto Mensal (O que sobra para viver)
            const tetoMensal = data.settings.salary - myFixedShare - requiredMonthlyAporte + (data.cycleRolloverBalance || 0);

            // Cartões, Débito e Deduções (Itaú)
            const totalDeductions = (data.cardsDeductions?.itauGas || 0) + (data.cardsDeductions?.itauSuper || 0);
            const totalCardsRaw = (data.cards.itau || 0) + (data.cards.mp || 0) + (data.cards.nubank || 0);
            const totalGastoMes = totalCardsRaw + (data.debitSpentThisCycle || 0) - totalDeductions;
            
            const totalRemainingMonth = tetoMensal - totalGastoMes;
            const monthPercentSpent = (totalGastoMes / tetoMensal) * 100;

            // Filtra os gastos ocorridos EXATAMENTE na janela desta semana
            const weekStartISO = weekStart.toISOString().split('T')[0];
            const weekEndISO = actualWeekEnd.toISOString().split('T')[0];
            
            const spentThisWeek = data.transactions
                .filter(tx => tx.dateISO >= weekStartISO && tx.dateISO <= weekEndISO && tx.category !== 'Investimento' && tx.category !== 'Resgate')
                .reduce((acc, tx) => acc + tx.amount, 0);

            // Teto da Semana: (TetoMensal - GastoAteSemanaPassada) / DiasRestantesAteFimDoMes * DiasDestaSemana
            // GastoAteSemanaPassada é o (TotalGastoMes - GastoDestaSemana)
            const gastoAteSemanaPassada = totalGastoMes - spentThisWeek;
            const saldoNoInicioDaSemana = tetoMensal - gastoAteSemanaPassada;
            
            const limitForThisWeek = (saldoNoInicioDaSemana / daysRemainingInCycleFromWeekStart) * daysInThisWeek;
            const limitAvailableThisWeek = limitForThisWeek - spentThisWeek;

            const weeklyProgressPercent = limitForThisWeek > 0 ? Math.min(100, (spentThisWeek / limitForThisWeek) * 100) : 100;
            const goalPercent = (data.invested / data.settings.goal) * 100;

            const handleSaveSettings = (e) => {
                e.preventDefault();
                saveData({ ...data, settings: tempSettings });
                alert("Configurações salvas e motor recalculado!");
            };

            const handleSettingChange = (field, val, isFixed = false) => {
                setTempSettings(prev => {
                    if (isFixed) return { ...prev, fixedExpenses: { ...prev.fixedExpenses, [field]: val }};
                    return { ...prev, [field]: val };
                });
            };

            const handleDeductionChange = (field, val) => {
                const parsed = parseFloat(val) || 0;
                saveData({ ...data, cardsDeductions: { ...data.cardsDeductions, [field]: parsed } });
            };

            return (
                <div className="flex flex-col h-full w-full relative">
                    {/* Header Light */}
                    <header className="px-6 pt-8 pb-4 bg-white border-b border-slate-200 flex justify-between items-center shrink-0 z-10 shadow-sm">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                                Olá, Pablo
                                {usingFallback && <span className="text-[10px] bg-rose-100 text-rose-600 px-2 py-0.5 rounded-full border border-rose-200">Offline</span>}
                            </h1>
                            <p className="text-sm text-slate-500">Operação Canoas v3.0</p>
                        </div>
                        <div className="h-10 w-10 bg-emerald-100 rounded-full flex items-center justify-center border border-emerald-200">
                            <span className="text-emerald-600"><IconTarget /></span>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto pb-28 hide-scrollbar">
                        
                        {/* TAB: HOME */}
                        {activeTab === 'home' && (
                            <div className="p-6 space-y-6">
                                {/* Weekly Budget Card V3 */}
                                <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-md relative overflow-hidden">
                                    <div className="flex justify-between items-start mb-1">
                                        <p className="text-slate-500 text-sm font-semibold uppercase tracking-wider">Teto da Semana</p>
                                        <span className="text-xs font-bold px-2 py-1 bg-slate-100 rounded-lg text-slate-600">
                                            Semana {currentWeekIndex + 1}
                                        </span>
                                    </div>
                                    
                                    <h2 className={`text-4xl font-black mb-1 ${limitAvailableThisWeek < 0 ? 'text-rose-600' : 'text-slate-900'}`}>
                                        {formatCurrency(limitAvailableThisWeek)}
                                    </h2>
                                    <p className="text-xs text-slate-500 mb-4 flex justify-between">
                                        <span>Gasto na semana: <strong className="text-slate-700">{formatCurrency(spentThisWeek)}</strong></span>
                                        <span>Meta: {formatCurrency(limitForThisWeek)}</span>
                                    </p>
                                    
                                    <div className="w-full bg-slate-100 rounded-full h-3 mb-2 overflow-hidden relative">
                                        <div 
                                            className={`absolute top-0 left-0 h-full rounded-full transition-all duration-500 ${
                                                weeklyProgressPercent > 90 ? 'bg-rose-500' : weeklyProgressPercent > 70 ? 'bg-amber-500' : 'bg-emerald-500'
                                            }`}
                                            style={{ width: `${weeklyProgressPercent}%` }}
                                        ></div>
                                    </div>
                                    <div className="flex justify-between text-[10px] text-slate-400 font-semibold uppercase">
                                        <span>0% consumido</span>
                                        <span>Faltam {daysInThisWeek - ((daysPassed - 1) % 7)} dias</span>
                                    </div>

                                    {limitAvailableThisWeek < 0 && (
                                        <div className="mt-4 flex items-center gap-2 text-rose-700 bg-rose-50 p-3 rounded-xl text-xs font-medium border border-rose-200">
                                            <IconAlertCircle />
                                            <span>Semana estourada! O déficit reduzirá as próximas.</span>
                                        </div>
                                    )}
                                </div>

                                {/* Macro Analytics V3 */}
                                <div className="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm space-y-4">
                                    <div className="flex items-center gap-2 text-slate-500 border-b border-slate-100 pb-3">
                                        <IconCalendarDays />
                                        <span className="text-xs font-bold uppercase tracking-wider">Raio-X do Ciclo ({formatDateShort(data.currentCycle.start)} a {formatDateShort(data.currentCycle.end)})</span>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <p className="text-[10px] text-slate-400 uppercase font-semibold mb-1">Teto Mensal</p>
                                            <p className="font-bold text-slate-800">{formatCurrency(tetoMensal)}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] text-slate-400 uppercase font-semibold mb-1">Total Gasto (C/ Deduções)</p>
                                            <p className={`font-bold ${totalGastoMes > tetoMensal ? 'text-rose-600' : 'text-slate-800'}`}>
                                                {formatCurrency(totalGastoMes)}
                                            </p>
                                        </div>
                                    </div>

                                    <div>
                                        <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                            <div 
                                                className={`h-full transition-all duration-500 ${monthPercentSpent > 90 ? 'bg-rose-500' : monthPercentSpent > 75 ? 'bg-amber-500' : 'bg-emerald-500'}`}
                                                style={{ width: `${Math.min(100, monthPercentSpent)}%` }}
                                            ></div>
                                        </div>
                                        <p className="text-[10px] text-slate-500 mt-1.5 text-right font-medium">Restam {formatCurrency(totalRemainingMonth)}</p>
                                    </div>
                                </div>

                                {/* Transactions */}
                                <div>
                                    <h3 className="text-sm font-bold text-slate-400 mb-4 uppercase tracking-wider">Últimas Transações</h3>
                                    {data.transactions.length === 0 ? (
                                        <div className="text-center py-8 bg-white rounded-2xl border border-slate-200 border-dashed">
                                            <p className="text-slate-400 text-sm">Nenhuma transação ainda.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {data.transactions.slice(0, 8).map(tx => (
                                                <div key={tx.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${tx.category === 'Investimento' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                            {tx.category === 'Investimento' ? <IconTrendingUp /> : <IconArrowDownRight />}
                                                        </div>
                                                        <div>
                                                            <p className="font-semibold text-slate-800 text-sm">{tx.desc}</p>
                                                            <p className="text-xs text-slate-500 capitalize">{tx.category} • {tx.card}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className={`font-bold block ${tx.category === 'Investimento' ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                            {tx.category === 'Investimento' ? '+' : '-'}{formatCurrency(tx.amount)}
                                                        </span>
                                                        <span className="text-[10px] text-slate-400">{tx.date}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TAB: CARDS */}
                        {activeTab === 'cards' && (
                            <div className="p-6 space-y-6">
                                <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-md text-center">
                                    <p className="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-2">Total Computado no Ciclo</p>
                                    <h2 className="text-4xl font-black text-slate-900 mb-4">{formatCurrency(totalGastoMes)}</h2>
                                    
                                    <div className="w-full bg-slate-100 rounded-full h-2 mb-2 overflow-hidden">
                                        <div 
                                            className={`h-full transition-all duration-500 ${monthPercentSpent > 90 ? 'bg-rose-500' : 'bg-blue-500'}`}
                                            style={{ width: `${Math.min(100, monthPercentSpent)}%` }}
                                        ></div>
                                    </div>
                                    <p className="text-xs text-slate-500">
                                        {monthPercentSpent.toFixed(1)}% do seu Teto ({formatCurrency(tetoMensal)})
                                    </p>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Faturas e Deduções</h3>
                                    
                                    {/* ITAU (Com deduções integradas) */}
                                    <div className="bg-orange-50 p-5 rounded-2xl border border-orange-200 text-orange-900 shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <div className="flex items-center gap-2 text-orange-600">
                                                <IconWallet />
                                                <span className="font-bold text-orange-800">Itaú (Total Banco)</span>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="font-black text-lg text-orange-700">{formatCurrency(data.cards.itau)}</span>
                                                <button onClick={() => setEditingCard('itau')} className="text-orange-600/50 hover:text-orange-600 transition-colors"><IconEdit /></button>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-white/60 rounded-xl p-3 border border-orange-200/50 space-y-3">
                                            <p className="text-[10px] font-bold uppercase text-orange-600/80 tracking-wider">Abater da Fatura (Já conta nos Fixos)</p>
                                            <div className="flex gap-4">
                                                <div className="w-1/2">
                                                    <label className="block text-[10px] text-orange-700 mb-1 font-semibold">Gasolina R$</label>
                                                    <input type="number" value={data.cardsDeductions?.itauGas || ''} onChange={(e) => handleDeductionChange('itauGas', e.target.value)} placeholder="0.00" className="w-full bg-white border border-orange-200 rounded-lg px-2 py-1.5 text-orange-900 focus:outline-none focus:border-orange-400 text-sm" />
                                                </div>
                                                <div className="w-1/2">
                                                    <label className="block text-[10px] text-orange-700 mb-1 font-semibold">Mercado R$</label>
                                                    <input type="number" value={data.cardsDeductions?.itauSuper || ''} onChange={(e) => handleDeductionChange('itauSuper', e.target.value)} placeholder="0.00" className="w-full bg-white border border-orange-200 rounded-lg px-2 py-1.5 text-orange-900 focus:outline-none focus:border-orange-400 text-sm" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* NUBANK E MP */}
                                    {['nubank', 'mp'].map(cardId => (
                                        <div key={cardId} className={`p-5 rounded-2xl border shadow-sm ${
                                            cardId === 'nubank' ? 'bg-purple-50 border-purple-200' : 'bg-blue-50 border-blue-200'
                                        }`}>
                                            <div className="flex justify-between items-center">
                                                <div className={`flex items-center gap-2 ${cardId === 'nubank' ? 'text-purple-600' : 'text-blue-600'}`}>
                                                    <IconWallet />
                                                    <span className={`font-bold capitalize ${cardId === 'nubank' ? 'text-purple-800' : 'text-blue-800'}`}>{cardId === 'mp' ? 'Mercado Pago' : cardId}</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <span className={`font-black text-lg ${cardId === 'nubank' ? 'text-purple-700' : 'text-blue-700'}`}>{formatCurrency(data.cards[cardId])}</span>
                                                    <button onClick={() => setEditingCard(cardId)} className="opacity-50 hover:opacity-100 transition-opacity"><IconEdit /></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}

                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 flex justify-between items-center shadow-sm">
                                        <div className="flex items-center gap-2 text-slate-500">
                                            <IconCreditCard />
                                            <span className="font-bold text-slate-700">Débito / PIX (Ciclo)</span>
                                        </div>
                                        <span className="font-black text-lg text-slate-800">{formatCurrency(data.debitSpentThisCycle || 0)}</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: GOAL */}
                        {activeTab === 'goal' && (
                            <div className="p-6 space-y-6">
                                <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-md text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-emerald-50 to-transparent pointer-events-none"></div>
                                    
                                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100 mb-4 text-emerald-600 border border-emerald-200">
                                        <IconTrendingUp />
                                    </div>
                                    <p className="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-1">Rumo aos {formatCurrency(data.settings.goal)}</p>
                                    
                                    {editingInvested ? (
                                        <div className="flex justify-center gap-2 mb-6">
                                            <input type="number" autoFocus defaultValue={data.invested}
                                                onBlur={(e) => {
                                                    const val = parseFloat(e.target.value);
                                                    if(!isNaN(val)) saveData({...data, invested: val});
                                                    setEditingInvested(false);
                                                }}
                                                className="bg-white border-2 border-emerald-500 text-emerald-600 text-3xl font-black text-center rounded-xl w-48 focus:outline-none py-2 shadow-inner"
                                            />
                                        </div>
                                    ) : (
                                        <div className="flex items-center justify-center gap-3 mb-6 group cursor-pointer" onClick={() => setEditingInvested(true)}>
                                            <h2 className="text-4xl font-black text-emerald-600">{formatCurrency(data.invested)}</h2>
                                            <span className="text-emerald-300 group-hover:text-emerald-500 transition-colors"><IconEdit /></span>
                                        </div>
                                    )}
                                    
                                    <div className="relative w-full h-4 bg-slate-100 rounded-full overflow-hidden mb-2">
                                        <div className="absolute top-0 left-0 h-full bg-emerald-500 transition-all duration-1000" style={{ width: `${goalPercent}%` }}></div>
                                    </div>
                                    <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase">
                                        <span>Início</span>
                                        <span>{goalPercent.toFixed(1)}% Concluído</span>
                                        <span>Meta</span>
                                    </div>
                                </div>

                                {/* Math Panel */}
                                <div className="bg-white border border-slate-200 shadow-sm rounded-2xl p-5">
                                    <h3 className="text-sm font-bold text-slate-500 mb-4 uppercase flex justify-between border-b border-slate-100 pb-2">
                                        <span>Alvo: {formatDateShort(data.settings.targetDate)}</span>
                                        <span className="text-emerald-600">{monthsRemaining} Meses</span>
                                    </h3>
                                    <div className="space-y-3 text-sm">
                                        <div className="flex justify-between text-slate-500"><span>Falta para Meta:</span> <span className="font-semibold text-slate-800">{formatCurrency(missingForGoal + futureIncomes)}</span></div>
                                        <div className="flex justify-between text-slate-500"><span>IR + 13º Previstos:</span> <span className="font-semibold text-blue-600">-{formatCurrency(futureIncomes)}</span></div>
                                        <div className="pt-3 border-t border-slate-100 flex justify-between items-center">
                                            <span className="text-slate-600 font-bold uppercase text-xs tracking-wider">Aporte Mensal Alvo:</span>
                                            <span className="font-black text-emerald-600 text-lg">{formatCurrency(requiredMonthlyAporte)}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setIsResgateModalOpen(true)} className="py-4 bg-white hover:bg-rose-50 text-rose-600 font-bold rounded-2xl flex flex-col items-center justify-center gap-1 transition-colors border border-rose-200 shadow-sm">
                                        <IconMinus /> <span className="text-xs uppercase tracking-wider">Resgatar</span>
                                    </button>
                                    <button onClick={() => setIsAporteModalOpen(true)} className="py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl flex flex-col items-center justify-center gap-1 transition-colors shadow-md">
                                        <IconPlus /> <span className="text-xs uppercase tracking-wider">Aportar</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* TAB: CONFIGURATIONS */}
                        {activeTab === 'config' && (
                            <div className="p-6 space-y-6">
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="p-2 bg-slate-200 rounded-lg text-slate-600"><IconSettings /></div>
                                    <h2 className="text-xl font-bold text-slate-900">Configurações Base</h2>
                                </div>

                                <form onSubmit={handleSaveSettings} className="space-y-8">
                                    
                                    {/* Macro Settings */}
                                    <div className="space-y-4 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                        <h3 className="text-xs font-bold text-emerald-600 uppercase tracking-widest border-b border-slate-100 pb-2">Rendimentos e Metas</h3>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Seu Salário Líquido (R$)</label>
                                            <input type="number" step="0.01" required value={tempSettings.salary} onChange={(e) => handleSettingChange('salary', e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-semibold focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Meta (R$)</label>
                                                <input type="number" step="0.01" required value={tempSettings.goal} onChange={(e) => handleSettingChange('goal', e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-semibold focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">Data Alvo</label>
                                                <input type="date" required value={tempSettings.targetDate} onChange={(e) => handleSettingChange('targetDate', e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-semibold focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Fixed Expenses */}
                                    <div className="space-y-4 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-end border-b border-slate-100 pb-2">
                                            <h3 className="text-xs font-bold text-emerald-600 uppercase tracking-widest">Despesas Fixas Familiares</h3>
                                            <span className="text-[10px] text-slate-600 font-bold bg-slate-100 px-2 py-1 rounded">Sua parte: 50%</span>
                                        </div>
                                        
                                        {[
                                            {id: 'luz', label: 'Energia Elétrica'}, {id: 'condominio', label: 'Condomínio'},
                                            {id: 'financiamento1', label: 'Financiamento 1'}, {id: 'financiamento2', label: 'Financiamento 2'},
                                            {id: 'internet', label: 'Internet / TV'}, {id: 'gasolina', label: 'Gasolina / Transp.'},
                                            {id: 'escola', label: 'Escola Vicente'}, {id: 'supermercado', label: 'Supermercado Base'},
                                            {id: 'planoSaude', label: 'Plano de Saúde'}, {id: 'seguro', label: 'Seguro do Carro'},
                                            {id: 'outros', label: 'Outras Recorrentes'}
                                        ].map(item => (
                                            <div key={item.id} className="flex items-center gap-4">
                                                <label className="w-1/2 text-sm text-slate-600 font-semibold">{item.label}</label>
                                                <div className="w-1/2 relative">
                                                    <span className="absolute left-3 top-3 text-slate-400 text-sm font-bold">R$</span>
                                                    <input type="number" step="0.01" value={tempSettings.fixedExpenses[item.id]} onChange={(e) => handleSettingChange(item.id, e.target.value, true)} className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-slate-900 font-semibold focus:outline-none focus:border-emerald-500" />
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="pt-2 pb-8">
                                        <button type="submit" className="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl flex justify-center items-center gap-2 transition-colors shadow-md">
                                            <IconSave /> Salvar e Recalcular Motor
                                        </button>
                                        
                                        <button type="button" onClick={() => setIsResetModalOpen(true)} className="w-full mt-6 py-4 bg-white border border-rose-200 text-rose-600 hover:bg-rose-50 font-bold rounded-xl flex justify-center items-center gap-2 transition-colors">
                                            <IconTrash /> Zerar Aplicativo (Perigo)
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* Floating Action Button */}
                    {activeTab !== 'config' && (
                        <div className="absolute bottom-24 right-6 z-40">
                            <button onClick={() => setIsExpenseModalOpen(true)} className="w-14 h-14 bg-emerald-500 hover:bg-emerald-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-emerald-500/30 transition-transform hover:scale-105 active:scale-95">
                                <IconPlus />
                            </button>
                        </div>
                    )}

                    {/* Bottom Navigation Light */}
                    <nav className="bg-white border-t border-slate-200 px-6 py-3 flex justify-between items-center shrink-0 z-30 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'home' ? 'text-emerald-600' : 'text-slate-400'}`}><IconHome /><span className="text-[10px] font-bold">Início</span></button>
                        <button onClick={() => setActiveTab('cards')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'cards' ? 'text-emerald-600' : 'text-slate-400'}`}><IconCreditCard /><span className="text-[10px] font-bold">Cartões</span></button>
                        <button onClick={() => setActiveTab('goal')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'goal' ? 'text-emerald-600' : 'text-slate-400'}`}><IconTrendingUp /><span className="text-[10px] font-bold">Meta</span></button>
                        <button onClick={() => setActiveTab('config')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'config' ? 'text-emerald-600' : 'text-slate-400'}`}><IconSettings /><span className="text-[10px] font-bold">Ajustes</span></button>
                    </nav>

                    {/* MODAL: Adicionar Gasto */}
                    {isExpenseModalOpen && (
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end justify-center sm:items-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-slate-900">Registrar Gasto</h2>
                                    <button onClick={() => setIsExpenseModalOpen(false)} className="p-2 bg-slate-100 rounded-full text-slate-500 hover:text-slate-800"><IconX /></button>
                                </div>
                                <form onSubmit={handleAddExpense} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Valor (R$)</label>
                                        <input type="number" step="0.01" name="amount" required placeholder="0.00" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-bold text-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" autoFocus />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Descrição</label>
                                        <input type="text" name="description" required placeholder="Ex: Padaria, Uber..." className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-semibold focus:outline-none focus:border-emerald-500" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Categoria</label>
                                            <select name="category" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-semibold focus:outline-none focus:border-emerald-500">
                                                <option value="transporte">Transporte</option><option value="supermercado">Mercado Extra</option>
                                                <option value="farmacia">Fórmula/Fralda</option><option value="padaria">Padaria</option>
                                                <option value="lazer">Lazer</option><option value="outros">Outros</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Forma</label>
                                            <select name="card" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-semibold focus:outline-none focus:border-emerald-500">
                                                <option value="debito">Débito / PIX</option>
                                                <option value="nubank">Nubank</option><option value="itau">Itaú</option><option value="mp">Mercado Pago</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl mt-4 transition-colors shadow-md">Confirmar Gasto</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Corrigir Fatura */}
                    {editingCard && (
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end justify-center sm:items-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-slate-900 flex capitalize">Fatura {editingCard === 'mp' ? 'Mercado Pago' : editingCard}</h2>
                                    <button onClick={() => setEditingCard(null)} className="p-2 bg-slate-100 rounded-full text-slate-500 hover:text-slate-800"><IconX /></button>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const newVal = parseFloat(new FormData(e.target).get('amount'));
                                    if (!isNaN(newVal)) {
                                        saveData({ ...data, cards: { ...data.cards, [editingCard]: newVal } });
                                        setEditingCard(null);
                                    }
                                }} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Valor Exato do Banco (R$)</label>
                                        <input type="number" step="0.01" name="amount" required defaultValue={data.cards[editingCard]} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-bold text-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" autoFocus />
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl transition-colors shadow-md">Atualizar Sistema</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODALS: Aporte / Resgate */}
                    {isAporteModalOpen && (
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end justify-center sm:items-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-xl border border-emerald-100">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-emerald-600">Registrar Aporte</h2>
                                    <button onClick={() => setIsAporteModalOpen(false)} className="p-2 bg-slate-100 rounded-full text-slate-500 hover:text-slate-800"><IconX /></button>
                                </div>
                                <form onSubmit={(e) => handleAporteResgate(e, 'aporte')} className="space-y-4">
                                    <input type="number" step="0.01" name="amount" required placeholder="Ex: 1000.00" className="w-full bg-slate-50 border border-emerald-200 rounded-xl px-4 py-3 text-slate-900 font-bold text-lg focus:outline-none focus:border-emerald-500" autoFocus />
                                    <button type="submit" className="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl transition-colors shadow-md">Efetivar Aporte</button>
                                </form>
                            </div>
                        </div>
                    )}
                    {isResgateModalOpen && (
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end justify-center sm:items-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-xl border border-rose-100">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-rose-600">Registrar Resgate</h2>
                                    <button onClick={() => setIsResgateModalOpen(false)} className="p-2 bg-slate-100 rounded-full text-slate-500 hover:text-slate-800"><IconX /></button>
                                </div>
                                <form onSubmit={(e) => handleAporteResgate(e, 'resgate')} className="space-y-4">
                                    <p className="text-xs font-semibold text-rose-500 mb-2">Isso diminuirá o seu saldo da meta.</p>
                                    <input type="number" step="0.01" name="amount" required placeholder="0.00" className="w-full bg-slate-50 border border-rose-200 rounded-xl px-4 py-3 text-slate-900 font-bold text-lg focus:outline-none focus:border-rose-500" autoFocus />
                                    <button type="submit" className="w-full py-4 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl transition-colors shadow-md">Retirar da Meta</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: RESET */}
                    {isResetModalOpen && (
                        <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 border-2 border-rose-500 text-center shadow-2xl">
                                <div className="w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-4 text-rose-600"><IconAlertCircle /></div>
                                <h2 className="text-xl font-black text-slate-900 mb-2">Atenção!</h2>
                                <p className="text-sm font-semibold text-slate-500 mb-6">Isso apagará permanentemente todos os gastos, saldo e histórico do banco de dados.</p>
                                <div className="space-y-3">
                                    <button onClick={handleResetApp} className="w-full py-4 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl transition-colors shadow-md">Sim, Excluir Tudo</button>
                                    <button onClick={() => setIsResetModalOpen(false)} className="w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
