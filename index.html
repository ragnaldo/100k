<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto 100k - Operação Canoas</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel para compilar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        body { background-color: #030712; color: #f3f4f6; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        /* Loader Animation */
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- CARREGAMENTO DO BANCO DE DADOS (FIREBASE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Deixamos as funções globais para o React (compilado pelo Babel) conseguir acessá-las
        window.FirebaseHelper = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, collection };
    </script>
</head>
<body class="bg-gray-950 text-gray-100 flex justify-center h-screen overflow-hidden">

    <div id="root" class="w-full max-w-md h-full relative shadow-2xl bg-gray-950 flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONES INLINE ---
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconCreditCard = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconWallet = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>;
        const IconArrowUpRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>;
        const IconArrowDownRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 7 10 10"/><path d="M17 7v10H7"/></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconCalendarDays = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>;
        const IconAlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;

        // --- LÓGICA DE DATAS ---
        const getCycleDates = (dateObj) => {
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth();
            const day = dateObj.getDate();
            let start, end;
            
            if (day >= 26) {
                start = new Date(year, month, 26);
                end = new Date(year, month + 1, 25);
            } else {
                start = new Date(year, month - 1, 26);
                end = new Date(year, month, 25);
            }
            start.setHours(0, 0, 0, 0);
            end.setHours(0, 0, 0, 0);
            return { start: start.toISOString(), end: end.toISOString() };
        };

        const defaultData = {
            goal: 100000,
            invested: 30000,
            baseMonthlyLimit: 4235.50,
            currentMonthlyLimit: 4235.50,
            currentCycle: getCycleDates(new Date()),
            spentThisCycle: 3109.75, // Inicial das faturas (Itau + MP + Nubank)
            cards: { itau: 2390.27, mp: 479.00, nubank: 240.48 },
            transactions: []
        };

        // --- INSTÂNCIAS GLOBAIS DO FIREBASE ---
        let dbInstance = null;
        let currentAppId = 'pablo-100k-app';

        const setupFirebase = () => {
            if (!window.FirebaseHelper) return null;
            if (dbInstance) return dbInstance;

            // Prioriza o ambiente de simulação se estiver rodando por aqui
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const config = JSON.parse(__firebase_config);
                currentAppId = typeof __app_id !== 'undefined' ? __app_id : currentAppId;
                const { initializeApp, getAuth, getFirestore } = window.FirebaseHelper;
                const app = initializeApp(config);
                dbInstance = { auth: getAuth(app), db: getFirestore(app) };
                return dbInstance;
            }

            // ====================================================================
            // PABLO, AQUI É O SEU DEVER DE CASA QUANDO SUBIR PARA O GITHUB!
            // ====================================================================
            const MEU_FIREBASE_CONFIG = {
                apiKey: "AIzaSyA2cH3AwQUv8Ruje2aslcuXiQhPEWS9z5Y",
                authDomain: "controle-100k.firebaseapp.com",
                projectId: "controle-100k",
                storageBucket: "controle-100k.firebasestorage.app",
                messagingSenderId: "315602450917",
                appId: "1:315602450917:web:91e3c4f8a0b33a53bed70c"
            }; 

            if(!MEU_FIREBASE_CONFIG) return null;

            const { initializeApp, getAuth, getFirestore } = window.FirebaseHelper;
            const app = initializeApp(MEU_FIREBASE_CONFIG);
            dbInstance = { auth: getAuth(app), db: getFirestore(app) };
            return dbInstance;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
            const [isAporteModalOpen, setIsAporteModalOpen] = useState(false);
            const [customAporte, setCustomAporte] = useState('');
            
            // Dados da Aplicação
            const [data, setData] = useState(null); // null indica "Carregando"
            const [user, setUser] = useState(null);
            const [isFirebaseReady, setIsFirebaseReady] = useState(false);
            const [usingFallback, setUsingFallback] = useState(false);

            // 1. Aguarda os scripts do Firebase carregarem na página
            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseHelper) {
                        clearInterval(checkFirebase);
                        setIsFirebaseReady(true);
                    }
                }, 100);
                return () => clearInterval(checkFirebase);
            }, []);

            // 2. Autenticação Invisível (Para banco de dados seguro)
            useEffect(() => {
                if (!isFirebaseReady) return;
                
                const fb = setupFirebase();
                if (!fb) {
                    // Sem chaves configuradas. Usa Memória Local (Plano B)
                    console.log("Firebase não configurado. Usando LocalStorage.");
                    setUsingFallback(true);
                    const saved = localStorage.getItem('pabloFinances');
                    setData(saved ? JSON.parse(saved) : defaultData);
                    return;
                }

                const { auth } = fb;
                const { signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FirebaseHelper;

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth); // Cria um usuário anônimo vinculado ao seu celular
                        }
                    } catch (e) {
                        console.error("Erro de Autenticação:", e);
                    }
                };

                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, [isFirebaseReady]);

            // 3. Sincronização de Dados com a Nuvem (Firestore)
            useEffect(() => {
                if (!isFirebaseReady || usingFallback) return;
                if (!user) return; // Aguarda a autenticação concluir

                const { db } = setupFirebase();
                const { doc, onSnapshot, setDoc } = window.FirebaseHelper;

                // Caminho seguro no banco de dados para os seus dados
                const docRef = doc(db, 'artifacts', currentAppId, 'users', user.uid, 'finances', 'dados_atuais');

                const unsub = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        let fetchedData = docSnap.data();
                        
                        // LÓGICA DE VIRADA DE MÊS (Rollover Automático)
                        const today = new Date();
                        const currentCycle = getCycleDates(today);
                        
                        if (fetchedData.currentCycle && fetchedData.currentCycle.start !== currentCycle.start) {
                            const carryOver = fetchedData.currentMonthlyLimit - (fetchedData.spentThisCycle || 0);
                            fetchedData.currentCycle = currentCycle;
                            fetchedData.currentMonthlyLimit = fetchedData.baseMonthlyLimit + carryOver;
                            fetchedData.spentThisCycle = 0;
                            // Salva a virada do mês na nuvem
                            setDoc(docRef, fetchedData);
                        }
                        setData(fetchedData);
                    } else {
                        // Primeira vez usando o app, cria os dados no banco
                        setDoc(docRef, defaultData);
                        setData(defaultData);
                    }
                }, (error) => {
                    console.error("Erro no Banco de Dados:", error);
                });

                return () => unsub();
            }, [user, isFirebaseReady, usingFallback]);

            // Função Central de Salvamento (Nuvem ou Local)
            const saveData = (newData) => {
                if (usingFallback) {
                    localStorage.setItem('pabloFinances', JSON.stringify(newData));
                    setData(newData); // Atualiza a tela
                } else {
                    const fb = setupFirebase();
                    if (fb && user) {
                        const { doc, setDoc } = window.FirebaseHelper;
                        const docRef = doc(fb.db, 'artifacts', currentAppId, 'users', user.uid, 'finances', 'dados_atuais');
                        setDoc(docRef, newData); // O onSnapshot (acima) vai atualizar a tela automaticamente
                    }
                }
            };

            // Handlers de Ações
            const handleAddExpense = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const amount = parseFloat(formData.get('amount'));
                const category = formData.get('category');
                const card = formData.get('card');
                const desc = formData.get('description');

                if (!amount || isNaN(amount)) return;

                const newData = {
                    ...data,
                    spentThisCycle: data.spentThisCycle + amount,
                    cards: {
                        ...data.cards,
                        [card]: data.cards[card] + amount
                    },
                    transactions: [
                        { id: Date.now(), amount, category, card, desc, date: new Date().toLocaleDateString('pt-BR') },
                        ...data.transactions
                    ]
                };

                saveData(newData);
                setIsExpenseModalOpen(false);
            };

            const handleAddAporte = (amount, isSobra = false) => {
                const newData = { ...data, invested: data.invested + amount };
                
                if (isSobra) {
                    newData.spentThisCycle = data.spentThisCycle + amount;
                    newData.transactions = [
                        { id: Date.now(), amount, category: 'Investimento', card: 'Débito/PIX', desc: 'Aporte Extra (Sobras)', date: new Date().toLocaleDateString('pt-BR') },
                        ...data.transactions
                    ];
                }
                
                saveData(newData);
                setIsAporteModalOpen(false);
                setCustomAporte('');
            };

            const formatCurrency = (value) => {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
            };

            const formatDateShort = (isoString) => {
                return new Date(isoString).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            };

            // TELA DE CARREGAMENTO (Enquanto busca dados na nuvem)
            if (!data) {
                return (
                    <div className="flex flex-col h-full w-full items-center justify-center bg-gray-950 text-emerald-500">
                        <div className="spinner mb-4"></div>
                        <p className="text-sm font-semibold text-gray-400 animate-pulse">Sincronizando cofre...</p>
                    </div>
                );
            }

            // Cálculos Diários Dinâmicos
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const cycleStart = new Date(data.currentCycle.start);
            const cycleEnd = new Date(data.currentCycle.end);

            const msPerDay = 1000 * 60 * 60 * 24;
            const cycleDaysTotal = Math.round((cycleEnd - cycleStart) / msPerDay) + 1;
            const daysPassed = Math.round((today - cycleStart) / msPerDay) + 1;
            const daysRemaining = cycleDaysTotal - daysPassed + 1;

            const totalRemainingMonth = data.currentMonthlyLimit - data.spentThisCycle;
            const monthPercentSpent = (data.spentThisCycle / data.currentMonthlyLimit) * 100;

            const baseDailyLimit = data.currentMonthlyLimit / cycleDaysTotal;
            const limitAvailableToday = daysRemaining > 0 ? (totalRemainingMonth / daysRemaining) : totalRemainingMonth;
            
            const dailyPercent = Math.min(100, Math.max(0, (limitAvailableToday / baseDailyLimit) * 100));

            const totalCartoes = data.cards.itau + data.cards.mp + data.cards.nubank;
            const goalPercent = (data.invested / data.goal) * 100;

            return (
                <div className="flex flex-col h-full w-full relative">
                    
                    {/* Header */}
                    <header className="px-6 pt-8 pb-6 bg-gray-900 border-b border-gray-800 flex justify-between items-center shrink-0">
                        <div>
                            <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                                Olá, Pablo
                                {usingFallback && <span className="text-[10px] bg-rose-500/20 text-rose-400 px-2 py-0.5 rounded-full border border-rose-500/30">Offline</span>}
                            </h1>
                            <p className="text-sm text-gray-400">Projeto 100k • Operação Canoas</p>
                        </div>
                        <div className="h-10 w-10 bg-emerald-500/10 rounded-full flex items-center justify-center border border-emerald-500/20">
                            <span className="text-emerald-400"><IconTarget /></span>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto pb-24 hide-scrollbar">
                        
                        {/* TAB: HOME */}
                        {activeTab === 'home' && (
                            <div className="p-6 space-y-6">
                                
                                {/* Daily Budget Card */}
                                <div className="bg-gray-900 rounded-3xl p-6 border border-gray-800 shadow-lg relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/5 rounded-full blur-3xl -mr-10 -mt-10"></div>
                                    
                                    <div className="flex justify-between items-start mb-1">
                                        <p className="text-gray-400 text-sm font-medium">Orçamento Dinâmico</p>
                                        <span className="text-xs font-bold px-2 py-1 bg-gray-800 rounded-lg text-gray-400">
                                            Dia {daysPassed} de {cycleDaysTotal}
                                        </span>
                                    </div>
                                    
                                    <h2 className={`text-4xl font-black mb-1 ${limitAvailableToday < 0 ? 'text-rose-500' : 'text-white'}`}>
                                        {formatCurrency(limitAvailableToday)}
                                    </h2>
                                    <p className="text-xs text-gray-500 mb-4">
                                        Saldo redistribuído para os {daysRemaining} dias restantes
                                    </p>
                                    
                                    <div className="w-full bg-gray-800 rounded-full h-3 mb-2 overflow-hidden">
                                        <div 
                                            className={`h-3 rounded-full transition-all duration-500 ${
                                                limitAvailableToday >= baseDailyLimit ? 'bg-emerald-500' : limitAvailableToday > (baseDailyLimit * 0.3) ? 'bg-amber-500' : 'bg-rose-500'
                                            }`}
                                            style={{ width: `${dailyPercent}%` }}
                                        ></div>
                                    </div>
                                    
                                    {limitAvailableToday < 0 && (
                                        <div className="mt-3 flex items-center gap-2 text-rose-400 bg-rose-500/10 p-2 rounded-xl text-xs font-medium">
                                            <IconAlertCircle />
                                            <span>Saldo mensal esgotado. Qualquer gasto agora vira dívida!</span>
                                        </div>
                                    )}
                                    {limitAvailableToday > 0 && limitAvailableToday < (baseDailyLimit * 0.5) && (
                                        <div className="mt-3 flex items-center gap-2 text-amber-400 bg-amber-500/10 p-2 rounded-xl text-xs font-medium">
                                            <IconAlertCircle />
                                            <span>Atenção: Limite diário abaixo do ideal ({formatCurrency(baseDailyLimit)}).</span>
                                        </div>
                                    )}
                                </div>

                                {/* Monthly Macro Card */}
                                <div className="bg-gray-900/50 rounded-2xl p-4 border border-gray-800 flex flex-col gap-3">
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center gap-2 text-gray-400">
                                            <IconCalendarDays />
                                            <span className="text-xs font-bold uppercase tracking-wider">Estado Atual Mensal</span>
                                        </div>
                                        <span className="text-xs font-medium text-gray-500">
                                            Ciclo: {formatDateShort(data.currentCycle.start)} a {formatDateShort(data.currentCycle.end)}
                                        </span>
                                    </div>
                                    
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="text-[10px] text-gray-500 mb-0.5">Saldo Restante do Mês</p>
                                            <p className={`font-bold ${totalRemainingMonth < 0 ? 'text-rose-500' : 'text-emerald-400'}`}>
                                                {formatCurrency(totalRemainingMonth)}
                                            </p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] text-gray-500 mb-0.5">Teto do Mês (C/ Sobras)</p>
                                            <p className="font-semibold text-gray-300">
                                                {formatCurrency(data.currentMonthlyLimit)}
                                            </p>
                                        </div>
                                    </div>

                                    <div className="w-full bg-gray-800/80 rounded-full h-1.5 overflow-hidden">
                                        <div 
                                            className={`h-full transition-all duration-500 ${monthPercentSpent > 90 ? 'bg-rose-500' : monthPercentSpent > 75 ? 'bg-amber-500' : 'bg-emerald-500'}`}
                                            style={{ width: `${Math.min(100, monthPercentSpent)}%` }}
                                        ></div>
                                    </div>
                                </div>

                                {/* Recent Transactions */}
                                <div>
                                    <h3 className="text-sm font-bold text-gray-400 mb-4 uppercase tracking-wider">Últimos Gastos</h3>
                                    {data.transactions.length === 0 ? (
                                        <div className="text-center py-8 bg-gray-900/50 rounded-2xl border border-gray-800 border-dashed">
                                            <p className="text-gray-500 text-sm">Nenhum gasto registrado ainda.</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {data.transactions.slice(0, 5).map(tx => (
                                                <div key={tx.id} className="bg-gray-900 p-4 rounded-2xl border border-gray-800 flex items-center justify-between">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-full bg-rose-500/10 flex items-center justify-center text-rose-500">
                                                            <IconArrowDownRight />
                                                        </div>
                                                        <div>
                                                            <p className="font-semibold text-gray-200 text-sm">{tx.desc}</p>
                                                            <p className="text-xs text-gray-500 capitalize">{tx.category} • {tx.card}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className="font-bold text-rose-400 block">-{formatCurrency(tx.amount)}</span>
                                                        <span className="text-[10px] text-gray-500">{tx.date}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TAB: CARDS */}
                        {activeTab === 'cards' && (
                            <div className="p-6 space-y-6">
                                <div className="bg-gray-900 rounded-3xl p-6 border border-gray-800 shadow-lg">
                                    <p className="text-gray-400 text-sm font-medium mb-1">Soma das Faturas (Tempo Real)</p>
                                    <div className="flex items-end gap-2 mb-4">
                                        <h2 className="text-3xl font-black text-white">{formatCurrency(totalCartoes)}</h2>
                                    </div>
                                    <p className="text-xs text-gray-500 leading-relaxed">
                                        Esses valores representam o fechamento em tempo real dos seus 3 cartões.
                                    </p>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider">Suas Faturas</h3>
                                    
                                    <div className="bg-gradient-to-br from-orange-500/10 to-orange-600/5 p-5 rounded-2xl border border-orange-500/20">
                                        <div className="flex justify-between items-center mb-2">
                                            <div className="flex items-center gap-2 text-orange-500">
                                                <IconWallet />
                                                <span className="font-semibold text-orange-100">Itaú</span>
                                            </div>
                                            <span className="font-bold text-lg text-white">{formatCurrency(data.cards.itau)}</span>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-br from-purple-500/10 to-purple-600/5 p-5 rounded-2xl border border-purple-500/20">
                                        <div className="flex justify-between items-center mb-2">
                                            <div className="flex items-center gap-2 text-purple-500">
                                                <IconWallet />
                                                <span className="font-semibold text-purple-100">Nubank</span>
                                            </div>
                                            <span className="font-bold text-lg text-white">{formatCurrency(data.cards.nubank)}</span>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-br from-blue-500/10 to-blue-600/5 p-5 rounded-2xl border border-blue-500/20">
                                        <div className="flex justify-between items-center mb-2">
                                            <div className="flex items-center gap-2 text-blue-500">
                                                <IconWallet />
                                                <span className="font-semibold text-blue-100">Mercado Pago</span>
                                            </div>
                                            <span className="font-bold text-lg text-white">{formatCurrency(data.cards.mp)}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB: GOAL */}
                        {activeTab === 'goal' && (
                            <div className="p-6 space-y-6">
                                <div className="bg-gray-900 rounded-3xl p-6 border border-gray-800 shadow-lg text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-emerald-500/10 to-transparent pointer-events-none"></div>
                                    
                                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/20 mb-4 text-emerald-400">
                                        <IconTrendingUp />
                                    </div>
                                    <p className="text-gray-400 text-sm font-medium mb-1">Rumo aos 100k</p>
                                    <h2 className="text-4xl font-black text-emerald-400 mb-6">{formatCurrency(data.invested)}</h2>
                                    
                                    <div className="relative w-full h-4 bg-gray-800 rounded-full overflow-hidden mb-2">
                                        <div 
                                            className="absolute top-0 left-0 h-full bg-gradient-to-r from-emerald-600 to-emerald-400 transition-all duration-1000"
                                            style={{ width: `${goalPercent}%` }}
                                        ></div>
                                    </div>
                                    <div className="flex justify-between text-xs font-semibold text-gray-500">
                                        <span>0</span>
                                        <span>{goalPercent.toFixed(1)}% Concluído</span>
                                        <span>100k</span>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => setIsAporteModalOpen(true)}
                                    className="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-black rounded-2xl flex items-center justify-center gap-2 transition-colors"
                                >
                                    <IconArrowUpRight />
                                    Registrar Aporte
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Floating Action Button (FAB) */}
                    <div className="absolute bottom-20 right-6 z-40">
                        <button 
                            onClick={() => setIsExpenseModalOpen(true)}
                            className="w-14 h-14 bg-emerald-500 hover:bg-emerald-600 text-gray-950 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-transform hover:scale-105 active:scale-95"
                        >
                            <IconPlus />
                        </button>
                    </div>

                    {/* Bottom Navigation */}
                    <nav className="bg-gray-900 border-t border-gray-800 px-6 py-4 flex justify-between items-center absolute bottom-0 w-full z-30 pb-safe">
                        <button 
                            onClick={() => setActiveTab('home')}
                            className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'home' ? 'text-emerald-400' : 'text-gray-500'}`}
                        >
                            <IconHome />
                            <span className="text-[10px] font-medium">Início</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('cards')}
                            className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'cards' ? 'text-emerald-400' : 'text-gray-500'}`}
                        >
                            <IconCreditCard />
                            <span className="text-[10px] font-medium">Cartões</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('goal')}
                            className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'goal' ? 'text-emerald-400' : 'text-gray-500'}`}
                        >
                            <IconTrendingUp />
                            <span className="text-[10px] font-medium">100k</span>
                        </button>
                    </nav>

                    {/* MODAL: Add Expense */}
                    {isExpenseModalOpen && (
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end justify-center sm:items-center p-4">
                            <div className="bg-gray-900 w-full max-w-sm rounded-3xl p-6 border border-gray-800">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-white">Registrar Gasto</h2>
                                    <button onClick={() => setIsExpenseModalOpen(false)} className="p-2 bg-gray-800 rounded-full text-gray-400 hover:text-white">
                                        <IconX />
                                    </button>
                                </div>
                                
                                <form onSubmit={handleAddExpense} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Valor (R$)</label>
                                        <input 
                                            type="number" 
                                            step="0.01"
                                            name="amount"
                                            required
                                            placeholder="0.00"
                                            className="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all"
                                            autoFocus
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Descrição Curta</label>
                                        <input 
                                            type="text" 
                                            name="description"
                                            required
                                            placeholder="Ex: Uber Volta, Panvel..."
                                            className="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition-all"
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Categoria</label>
                                            <select name="category" className="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white appearance-none focus:outline-none focus:border-emerald-500">
                                                <option value="transporte">Transporte</option>
                                                <option value="supermercado">Mercado Extra</option>
                                                <option value="farmacia">Fórmula/Fralda</option>
                                                <option value="padaria">Padaria</option>
                                                <option value="lazer">Lazer</option>
                                                <option value="outros">Outros</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Cartão</label>
                                            <select name="card" className="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white appearance-none focus:outline-none focus:border-emerald-500">
                                                <option value="nubank">Nubank</option>
                                                <option value="itau">Itaú</option>
                                                <option value="mp">Mercado Pago</option>
                                            </select>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold rounded-xl mt-4 transition-colors">
                                        Descontar do Limite Diário
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Add Aporte */}
                    {isAporteModalOpen && (
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-end justify-center sm:items-center p-4">
                            <div className="bg-gray-900 w-full max-w-sm rounded-3xl p-6 border border-gray-800">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold text-white">Registar Aporte</h2>
                                    <button onClick={() => setIsAporteModalOpen(false)} className="p-2 bg-gray-800 rounded-full text-gray-400 hover:text-white">
                                        <IconX />
                                    </button>
                                </div>
                                
                                <div className="space-y-3 max-h-[70vh] overflow-y-auto hide-scrollbar">
                                    <h3 className="text-sm font-bold text-gray-400 mb-2">Aportes Programados</h3>
                                    <button onClick={() => handleAddAporte(5111)} className="w-full p-4 bg-gray-950 border border-gray-800 rounded-xl flex justify-between items-center hover:border-emerald-500 transition-colors">
                                        <span className="font-semibold text-gray-300">Aporte Mensal (Salário)</span>
                                        <span className="font-bold text-emerald-400">+ R$ 5.111</span>
                                    </button>
                                    <button onClick={() => handleAddAporte(4000)} className="w-full p-4 bg-gray-950 border border-gray-800 rounded-xl flex justify-between items-center hover:border-emerald-500 transition-colors">
                                        <span className="font-semibold text-gray-300">Restituição IR</span>
                                        <span className="font-bold text-emerald-400">+ R$ 4.000</span>
                                    </button>
                                    <button onClick={() => handleAddAporte(12000)} className="w-full p-4 bg-gray-950 border border-gray-800 rounded-xl flex justify-between items-center hover:border-emerald-500 transition-colors">
                                        <span className="font-semibold text-gray-300">13º (Parcela 1)</span>
                                        <span className="font-bold text-emerald-400">+ R$ 12.000</span>
                                    </button>
                                    <button onClick={() => handleAddAporte(3000)} className="w-full p-4 bg-gray-950 border border-gray-800 rounded-xl flex justify-between items-center hover:border-emerald-500 transition-colors">
                                        <span className="font-semibold text-gray-300">13º (Parcela 2)</span>
                                        <span className="font-bold text-emerald-400">+ R$ 3.000</span>
                                    </button>

                                    <div className="mt-6 pt-6 border-t border-gray-800">
                                        <h3 className="text-sm font-bold text-gray-400 mb-3">Aporte Livre (Usar Sobra)</h3>
                                        <div className="flex gap-2">
                                            <input 
                                                type="number" 
                                                step="0.01"
                                                value={customAporte}
                                                onChange={(e) => setCustomAporte(e.target.value)}
                                                placeholder="0.00"
                                                className="flex-1 bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500"
                                            />
                                            <button 
                                                onClick={() => {
                                                    const val = parseFloat(customAporte);
                                                    if(val && !isNaN(val)) handleAddAporte(val, true);
                                                }}
                                                className="px-4 bg-emerald-500 hover:bg-emerald-600 text-gray-950 font-bold rounded-xl transition-colors"
                                            >
                                                Aportar
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
